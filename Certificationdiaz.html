          return;
        }

        const row = cell.parentElement;
        const table = cell.closest("table");
        const rows = Array.from(table.rows);
        const rowIndex = rows.indexOf(row);
        const cellIndex = Array.from(row.cells).indexOf(cell);

        if (action === "deleteTable") {
          table.remove();
          updateNote(subject, editor);
          return;
        }

        if (action === "insertRowBelow") {
          const newRow = row.cloneNode(true);
          Array.from(newRow.cells).forEach((newCell) => {
            newCell.innerHTML = "<br>";
          });
          row.after(newRow);
        }

        if (action === "deleteRow") {
          if (rows.length > 1) {
            row.remove();
          } else {
            Array.from(row.cells).forEach((targetCell) => {
              targetCell.innerHTML = "<br>";
            });
          }
        }

        if (action === "insertColumnRight") {
          rows.forEach((targetRow) => {
            const sourceCell = targetRow.cells[cellIndex] || targetRow.cells[targetRow.cells.length - 1];
            const newCell = sourceCell.cloneNode(false);
            newCell.innerHTML = "<br>";
            sourceCell.after(newCell);
          });
        }

        if (action === "deleteColumn") {
          const columnCount = rows[0]?.cells.length || 0;
          rows.forEach((targetRow) => {
            if (columnCount > 1) {
              targetRow.deleteCell(Math.min(cellIndex, targetRow.cells.length - 1));
            } else if (targetRow.cells[0]) {
              targetRow.cells[0].innerHTML = "<br>";
            }
          });
        }

        updateNote(subject, editor);
        const targetRow = table.rows[Math.min(rowIndex, table.rows.length - 1)];
        const targetCell = targetRow?.cells[Math.min(cellIndex, targetRow.cells.length - 1)];
        if (targetCell) {
          placeCursorInElement(targetCell);
        }
      }

      function placeCursorInElement(element) {
        const range = document.createRange();
        range.selectNodeContents(element);
        range.collapse(false);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function insertLink(subject, editor) {
        const rawUrl = window.prompt("삽입할 링크 주소를 입력하세요.");

        if (!rawUrl) {
          return;
        }

        const url = normalizeUrl(rawUrl.trim());
        const selection = window.getSelection();
        const selectedText = selection.toString();

        if (selectedText) {
          document.execCommand("createLink", false, url);
        } else {
          insertHtmlAtCursor(`<a href="${escapeHtml(url)}" target="_blank">${escapeHtml(url)}</a>`);
        }

        updateNote(subject, editor);
      }

      function normalizeUrl(url) {
        if (/^(https?:\/\/|mailto:|tel:)/i.test(url)) {
          return url;
        }

        return `https://${url}`;
      }

      function insertImageFile(file, subject, editor) {
        if (!file.type.startsWith("image/")) {
          return;
        }

        const reader = new FileReader();
        reader.addEventListener("load", () => {
          insertHtmlAtCursor(
            `<img src="${reader.result}" alt="${escapeHtml(file.name)}"><br>`,
          );
          updateNote(subject, editor);
        });
        reader.readAsDataURL(file);
      }

      async function pastePlainTextFromClipboard(subject, editor) {
        editor.focus();

        try {
          if (!navigator.clipboard?.readText) {
            throw new Error("clipboard unavailable");
          }

          const text = await navigator.clipboard.readText();
          document.execCommand("insertText", false, text);
          updateNote(subject, editor);
        } catch {
          showConfirmModal({
            title: "텍스트 붙여넣기",
            message: "브라우저가 클립보드 접근을 막았습니다. 복사한 내용을 이 창에 붙여넣고 추가를 눌러주세요.",
            inputLabel: "붙여넣을 텍스트",
            confirmLabel: "추가",
            onConfirm: (text) => {
              editor.focus();
              document.execCommand("insertText", false, text);
              updateNote(subject, editor);
            },
          });
        }
      }

      function normalizeColor(color) {
        if (!color || color === "transparent") {
          return "transparent";
        }

        if (color.startsWith("#")) {
          return color.toLowerCase();
        }

        const rgbMatch = color.match(/\d+/g);
        if (!rgbMatch || rgbMatch.length < 3) {
          return color.toLowerCase();
        }

        return `#${rgbMatch
          .slice(0, 3)
          .map((value) => Number(value).toString(16).padStart(2, "0"))
          .join("")}`;
      }

      function getCommandColor(command) {
        const value = document.queryCommandValue(command);
        const normalizedColor = normalizeColor(value);

        if (command === "hiliteColor" && normalizedColor === DEFAULT_BACKGROUND_COLOR) {
          return "transparent";
        }

        return normalizedColor;
      }

      function applyPaletteColor(button) {
        const command = button.dataset.paletteCommand;
        const selectedColor = normalizeColor(button.dataset.value);
        const currentColor = getCommandColor(command);

        if (currentColor === selectedColor) {
          const resetColor =
            command === "foreColor" ? DEFAULT_TEXT_COLOR : DEFAULT_BACKGROUND_COLOR;
          document.execCommand(command, false, resetColor);
          return;
        }

        document.execCommand(command, false, selectedColor);
      }

      function updateFormatState(formatButtons, paletteButtons, fontSize, formatStatus) {
        const activeValues = [];
        const currentFontSize = document.queryCommandValue("fontSize") || "";
        const currentTextColor = getCommandColor("foreColor");
        const currentHighlightColor = getCommandColor("hiliteColor");

        formatButtons.forEach((button) => {
          const command = button.dataset.command;
          const stateCommands = [
            "bold",
            "italic",
            "underline",
            "strikeThrough",
            "insertUnorderedList",
            "insertOrderedList",
          ];

          if (stateCommands.includes(command) && document.queryCommandState(command)) {
            button.classList.add("active");
            activeValues.push(button.textContent.trim());
          } else {
            button.classList.remove("active");
          }
        });

        paletteButtons.forEach((button) => {
          const command = button.dataset.paletteCommand;
          const value = normalizeColor(button.dataset.value);
          const currentColor = command === "foreColor" ? currentTextColor : currentHighlightColor;
          const isActive = currentColor === value;
          button.classList.toggle("active", isActive);

          if (isActive) {
            activeValues.push(button.title);
          }
        });

        fontSize.value = FONT_SIZE_LABELS[currentFontSize] ? currentFontSize : "";
        fontSize.classList.toggle("active", Boolean(fontSize.value));

        if (fontSize.value) {
          activeValues.unshift(`크기: ${FONT_SIZE_LABELS[fontSize.value]}`);
        }

        formatStatus.textContent = activeValues.length
          ? `선택: ${activeValues.join(" · ")}`
          : "선택값 없음";
      }

      function getClosestListItem(editor) {
        const selection = window.getSelection();
        if (!selection.rangeCount) {
          return null;
        }

        let node = selection.anchorNode;
        if (node.nodeType === Node.TEXT_NODE) {
          node = node.parentElement;
        }

        while (node && node !== editor) {
          if (node.tagName === "LI") {
            return node;
          }
          node = node.parentElement;
        }

        return null;
      }

      function handleEditorKeydown(
        event,
        subject,
        editor,
        formatButtons,
        paletteButtons,
        fontSize,
        formatStatus,
      ) {
        const key = event.key.toLowerCase();
        const code = event.code;
        const isCommandKey = event.metaKey || event.ctrlKey;
        const shortcutCommand = getShortcutCommand(event, code, isCommandKey);

        if (shortcutCommand) {
          event.preventDefault();
          event.stopPropagation();
          editor.focus();

          if (shortcutCommand === "createLink") {
            insertLink(subject, editor);
          } else if (shortcutCommand.startsWith("table:")) {
            applyTableAction(shortcutCommand.replace("table:", ""), subject, editor);
          } else {
            document.execCommand(shortcutCommand, false, null);
            updateNote(subject, editor);
          }

          updateFormatState(formatButtons, paletteButtons, fontSize, formatStatus);
          return;
        }

        const listItem = getClosestListItem(editor);

        if (event.key === "Tab" && listItem) {
          event.preventDefault();
          document.execCommand(event.shiftKey ? "outdent" : "indent");
          updateNote(subject, editor);
          return;
        }

        if (event.key === "Enter" && listItem && listItem.textContent.trim() === "") {
          event.preventDefault();
          document.execCommand("outdent");
          updateNote(subject, editor);
        }
      }

      function getShortcutCommand(event, code, isCommandKey) {
        if (isCommandKey && !event.altKey && code === "KeyB") {
          return "bold";
        }

        if (isCommandKey && !event.altKey && code === "KeyI") {
          return "italic";
        }

        if (isCommandKey && !event.altKey && code === "KeyU") {
          return "underline";
        }

        if (isCommandKey && !event.altKey && code === "KeyK") {
          return "createLink";
        }

        if (isCommandKey && event.shiftKey && code === "Digit7") {
          return "insertOrderedList";
        }

        if (isCommandKey && event.shiftKey && code === "Digit8") {
          return "insertUnorderedList";
        }

        if ((event.altKey || event.metaKey) && event.shiftKey && code === "Digit5") {
          return "strikeThrough";
        }

        if (isCommandKey && code === "Backslash") {
          return "removeFormat";
        }

        if (isCommandKey && event.altKey && code === "ArrowDown") {
          return "table:insertRowBelow";
        }

        if (isCommandKey && event.altKey && code === "ArrowUp") {
          return "table:deleteRow";
        }

        if (isCommandKey && event.altKey && code === "ArrowRight") {
          return "table:insertColumnRight";
        }

        if (isCommandKey && event.altKey && code === "ArrowLeft") {
          return "table:deleteColumn";
        }

        if (isCommandKey && event.altKey && (code === "Backspace" || code === "Delete")) {
          return "table:deleteTable";
        }

        if (event.altKey && event.shiftKey && code === "KeyR") {
          return "table:insertRowBelow";
        }

        if (event.altKey && event.shiftKey && code === "KeyE") {
          return "table:deleteRow";
        }

        if (event.altKey && event.shiftKey && code === "KeyC") {
          return "table:insertColumnRight";
        }

        if (event.altKey && event.shiftKey && code === "KeyX") {
          return "table:deleteColumn";
        }

        if (event.altKey && event.shiftKey && code === "KeyT") {
          return "table:deleteTable";
        }

        return null;
      }

      function updateNote(subject, editor) {
        subject.noteHtml = editor.innerHTML;
        subject.note = editor.innerText;
        subject.updatedAt = Date.now();
        saveState();
        renderFolders();
      }

      function render() {
        renderFolders();
        renderEditor();
        renderStorageUsage();
      }

      function renderToolsPanel() {
        toolsPanel.classList.toggle("is-hidden", !toolsOpen);
        toolsToggle.setAttribute("aria-expanded", String(toolsOpen));
        toolsToggleIcon.textContent = toolsOpen ? "×" : "+";
        toolsToggleText.textContent = toolsOpen ? "검색/추가 닫기" : "검색/추가 열기";
      }

      function exportBackup() {
        const backup = {
          version: 2,
          exportedAt: new Date().toISOString(),
          storage: "IndexedDB",
          state: cloneState(state),
        };
        const dateLabel = new Date().toISOString().slice(0, 10);

        downloadFile({
          filename: `Certificationdiaz-backup-${dateLabel}.json`,
          content: JSON.stringify(backup, null, 2),
          type: "application/json",
        });
      }

      function exportCurrentNote() {
        const subject = getActiveSubject();

        if (!subject) {
          showConfirmModal({
            title: "파일 저장 불가",
            message: "먼저 저장할 과목 파일을 선택해 주세요.",
            confirmLabel: "확인",
            cancelLabel: "닫기",
            onConfirm: () => {},
          });
          return;
        }

        showOptionModal({
          title: "파일 저장",
          message: "현재 선택한 메모를 어떤 형식으로 저장할까요?",
          options: [
            {
              label: "HTML",
              action: () => exportNoteAsHtml(subject),
            },
            {
              label: "TXT",
              action: () => exportNoteAsText(subject),
            },
          ],
        });
      }

      function exportNoteAsHtml(subject) {
        const noteHtml = subject.noteHtml || plainTextToHtml(subject.note || "");
        const html = `<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${escapeHtml(subject.title)}</title>
    <style>
      body { max-width: 860px; margin: 40px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1d2720; line-height: 1.7; }
      h1 { font-size: 28px; line-height: 1.3; }
      table { width: 100%; border-collapse: collapse; margin: 12px 0; }
      td, th { border: 1px solid #bac8be; padding: 8px; vertical-align: top; }
      th { background: #edf4ef; }
      img { max-width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <h1>${escapeHtml(subject.title)}</h1>
    <article>${noteHtml}</article>
  </body>
</html>`;

        downloadFile({
          filename: `${sanitizeFilename(subject.title)}.html`,
          content: html,
          type: "text/html",
        });
      }

      function exportNoteAsText(subject) {
        downloadFile({
          filename: `${sanitizeFilename(subject.title)}.txt`,
          content: getNoteText(subject),
          type: "text/plain",
        });
      }

      function sanitizeFilename(value) {
        return String(value || "memo")
          .trim()
          .replace(/[\\/:*?"<>|]/g, "_")
          .slice(0, 80) || "memo";
      }

      function downloadFile({ filename, content, type }) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = filename;
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function importBackupFile(file) {
        const reader = new FileReader();

        reader.addEventListener("load", () => {
          try {
            const parsed = JSON.parse(reader.result);
            const nextState = parsed.state || parsed;

            if (!Array.isArray(nextState.subjects)) {
              throw new Error("Invalid backup");
            }

            showConfirmModal({
              title: "백업 복원",
              message: "현재 메모 공간이 백업 파일 내용으로 바뀝니다. 계속하시겠습니까?",
              confirmLabel: "복원",
              danger: true,
              onConfirm: () => {
                state = migrateState(nextState);
                activeId = state.activeId || null;
                activeFolderId = state.activeFolderId || ALL_FOLDERS_ID;
                saveState();
                render();
              },
            });
          } catch {
            showConfirmModal({
              title: "복원 실패",
              message: "백업 파일 형식이 올바르지 않습니다.",
              confirmLabel: "확인",
              cancelLabel: "닫기",
              onConfirm: () => {},
            });
          }
        });

        reader.readAsText(file);
      }

      async function initializeApp() {
        updateStorageEstimate();

        try {
          state = await loadState();
        } catch {
          state = createDefaultState();
        }

        activeId = state.activeId || null;
        activeFolderId = state.activeFolderId || ALL_FOLDERS_ID;
        renderToolsPanel();
        render();
      }

      function createFolder(title, parentId) {
        const folder = {
          id: crypto.randomUUID(),
          title,
          parentId,
        };

        state.folders.push(folder);
        activeFolderId = folder.id;
        activeId = null;
        saveState();
        render();
      }

      function createSubject(title, folderId) {
        if (folderId === ALL_FOLDERS_ID || folderId === DEFAULT_FOLDER_ID) {
          showConfirmModal({
            title: "파일 추가 불가",
            message: "전체 또는 기본 폴더에서는 파일을 만들 수 없습니다. 학습 폴더를 선택한 뒤 추가해 주세요.",
            confirmLabel: "확인",
            onConfirm: () => {},
          });
          return;
        }

        const subject = {
          id: crypto.randomUUID(),
          folderId,
          title,
          note: "",
          isReadonly: false,
          isLocked: false,
          updatedAt: Date.now(),
        };

        state.subjects.unshift(subject);
        activeFolderId = subject.folderId;
        activeId = subject.id;
        saveState();
        render();
      }

      toolsToggle.addEventListener("click", () => {
        toolsOpen = !toolsOpen;
        renderToolsPanel();

        if (toolsOpen) {
          subjectInput.focus();
        }
      });

      folderForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const title = folderInput.value.trim();

        if (!title) {
          folderInput.focus();
          return;
        }

        folderInput.value = "";
        showCreateFolderModal(activeFolderId === ALL_FOLDERS_ID ? null : activeFolderId, title);
      });

      subjectForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const title = subjectInput.value.trim();

        if (!title) {
          subjectInput.focus();
          return;
        }

        subjectInput.value = "";
        showCreateSubjectModal(activeFolderId, title);
      });

      searchInput.addEventListener("input", renderFolders);
      exportButton.addEventListener("click", exportBackup);
      exportNoteButton.addEventListener("click", exportCurrentNote);
      importInput.addEventListener("change", () => {
        const [file] = importInput.files;
        importInput.value = "";

        if (file) {
          importBackupFile(file);
        }
      });
      window.addEventListener("beforeunload", saveState);

      initializeApp();
    </script>
  </body>
</html>
